<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lunefia 🌙</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        #layout-principal {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 20px;
            padding: 24px 24px 120px 24px;
            align-items: start;
        }
        #columna-calendario #calendario {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #columna-lateral {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .lateral-seccion {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
        }
        .lateral-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .lateral-header span { font-size: 18px; flex-shrink: 0; }
        .lateral-header h2 { font-size: 14px; color: #fff; margin: 0; flex: 1; }
        .btn-lateral {
            padding: 5px 12px;
            background: linear-gradient(135deg, #5b3fd4, #7c5ce8);
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 11px;
            font-family: 'Sour Gummy', sans-serif;
            cursor: pointer;
        }
        #notas-texto {
            width: 100%;
            min-height: 160px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px 12px;
            color: rgba(255,255,255,0.8);
            font-size: 12.5px;
            font-family: 'Sour Gummy', sans-serif;
            resize: vertical;
            line-height: 1.6;
        }
        #notas-texto:focus { outline: none; border-color: rgba(124,92,232,0.5); }
        #notas-texto::placeholder { color: rgba(255,255,255,0.2); }
        .lista-titulo { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
        #saludo-usuario { font-size: 13px; color: rgba(255,255,255,0.6); }
        .btn-logout { font-size: 12px; color: rgba(255,255,255,0.45); text-decoration: none; padding: 5px 12px; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; font-family: 'Sour Gummy', sans-serif; }
        .btn-logout:hover { background: rgba(255,255,255,0.07); color: white; }

        /* Botón volver al inicio */
        .btn-home {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            padding: 5px 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            font-family: 'Sour Gummy', sans-serif;
            transition: background 0.2s, color 0.2s;
        }
        .btn-home:hover { background: rgba(255,255,255,0.07); color: white; }

        /* Nombre del calendario activo */
        #nombre-calendario {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            padding: 4px 10px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        @media (max-width: 860px) {
            #layout-principal { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="encabezado">
        <div id="encabezado-contenido">
            <div style="display:flex;align-items:center;gap:12px">
                <h1>🌙 Lunefia</h1>
                <span id="nombre-calendario">Cargando...</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
                <span id="saludo-usuario">Hola, {{ usuario }} 👋</span>
                <a href="/" class="btn-home">← Mis calendarios</a>
                <a href="/logout" class="btn-logout">Salir</a>
                <div id="encabezado-puntos">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </div>

    <div id="layout-principal">

        <!-- Calendario -->
        <div id="columna-calendario">
            <div id="calendario"></div>
        </div>

        <!-- Columna lateral: solo notas + IA -->
        <div id="columna-lateral">

            <section class="lateral-seccion" id="seccion-notas">
                <div class="lateral-header">
                    <span>📝</span>
                    <h2>Mis notas</h2>
                    <button class="btn-lateral" onclick="guardarNota()">Guardar</button>
                </div>
                <textarea id="notas-texto" placeholder="Escribe tus notas aquí... Solo tú las ves 🌙"></textarea>
            </section>

        </div>
    </div>

    <!-- IA panel -->
    <div id="panel-ia">
        <div id="panel-ia-header">
            <span id="ia-icono">🌙</span>
            <div>
                <p id="ia-nombre">Lunefia IA</p>
                <span id="ia-estado">● activa</span>
            </div>
        </div>
        <div id="ia-separador"></div>
        <p id="ia-mensaje">Cargando tu resumen del día...</p>
        <div id="mensaje-motivacional"></div>
    </div>

    <!-- Botón agregar evento -->
    <button id="btn-agregar" onclick="togglePanel()">+</button>

    <!-- Panel nuevo evento -->
    <div id="panel-evento" style="display:none">
        <h2>✨ Agregar evento</h2>
        <input type="text" id="titulo" placeholder="Nombre del evento">
        <label>Fecha:</label>
        <input type="date" id="fecha">
        <label>Hora de inicio:</label>
        <input type="time" id="hora-inicio">
        <label>Hora de finalización:</label>
        <input type="time" id="hora-fin">
        <label>Fecha de finalización (si es otro día):</label>
        <input type="date" id="fecha-fin">
        <label>Materia:</label>
        <input type="text" id="materia" placeholder="Ej: Biología, Matemáticas...">
        <label>Tipo:</label>
        <select id="tipo">
            <option value="tarea">📘 Tarea</option>
            <option value="examen">📕 Examen</option>
            <option value="proyecto">📗 Proyecto</option>
        </select>
        <button onclick="guardarEvento()">Guardar 💕</button>
        <button id="btn-cancelar" onclick="togglePanel()">Cancelar</button>
    </div>

    <!-- Modal detalle/editar evento -->
<div id="modal-detalle" style="display:none">
    <div id="modal-detalle-caja">
        <div id="modal-detalle-header">
            <h3 id="detalle-titulo-display"></h3>
            <span id="detalle-creador"></span>
        </div>
        <div class="detalle-campo">
            <label>Nombre</label>
            <input type="text" id="detalle-titulo-input">
        </div>
        <div class="detalle-campo">
            <label>Fecha</label>
            <input type="date" id="detalle-fecha">
        </div>
        <div class="detalle-campo">
            <label>Hora inicio</label>
            <input type="time" id="detalle-hora-inicio">
        </div>
        <div class="detalle-campo">
            <label>Hora fin</label>
            <input type="time" id="detalle-hora-fin">
        </div>
        <div class="detalle-campo">
            <label>Materia</label>
            <input type="text" id="detalle-materia">
        </div>
        <div class="detalle-campo">
            <label>Tipo</label>
            <select id="detalle-tipo">
                <option value="tarea">📘 Tarea</option>
                <option value="examen">📕 Examen</option>
                <option value="proyecto">📗 Proyecto</option>
            </select>
        </div>
        <div id="detalle-botones">
            <button id="btn-guardar-edicion" onclick="guardarEdicion()">Guardar cambios ✨</button>
            <button id="btn-borrar-evento" onclick="pedirConfirmacion()">🗑 Borrar</button>
            <button id="btn-cerrar-detalle" onclick="cerrarDetalle()">Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal confirmación borrar -->
<div id="modal-confirmar-borrar" style="display:none">
    <div id="modal-caja">
        <p id="modal-texto">¿Estás segura de querer borrar este evento?</p>
        <div id="modal-botones">
            <button id="modal-confirmar">🗑 Sí, borrar</button>
            <button id="modal-cancelar" onclick="cerrarConfirmacion()">Cancelar</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script>
        // Obtener el ID del calendario de la URL: /calendario/<id>
        const calId = window.location.pathname.split('/').pop();

        document.addEventListener('DOMContentLoaded', async function() {

            let esGrupal = false;
            // Cargar nombre del calendario
            try {
                const res = await fetch('/api/calendarios');
                const lista = await res.json();
                const actual = lista.find(c => String(c.id) === String(calId));
                if (actual) {
                    document.getElementById('nombre-calendario').textContent =
                        (actual.tipo === 'grupal' ? '👥 ' : '🗓 ') + actual.nombre;
                    esGrupal = actual.tipo === 'grupal';
                }
            } catch {}

            var cal = new FullCalendar.Calendar(document.getElementById('calendario'), {
                initialView: 'dayGridMonth',
                locale: 'es',
                nowIndicator: true,
                customButtons: {
                    agregarPersonas: {
                        text: '+ Personas',
                        click: function() { abrirModalPersonas(); }
                    }
                },    
                headerToolbar: {
                    left: esGrupal ? 'prev,next today agregarPersonas' : 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                events: async function(info, successCallback) {
                    const res = await fetch(`/api/eventos?calendario=${calId}`);
                    const eventos = await res.json();
                    successCallback(eventos);
                },
                eventDidMount: function(info) {
                    const tipo = info.event.extendedProps.tipo;
                    const dueño = info.event.extendedProps.dueño;
                    if (tipo === 'tarea')    { info.el.style.backgroundColor = '#4A90D9'; info.el.style.borderColor = '#2C6FAC'; }
                    else if (tipo === 'examen')   { info.el.style.backgroundColor = '#E74C3C'; info.el.style.borderColor = '#B03A2E'; }
                    else if (tipo === 'proyecto') { info.el.style.backgroundColor = '#27AE60'; info.el.style.borderColor = '#1E8449'; }
                    
                    if (esGrupal && dueño) {
                        const tag = document.createElement('div');
                        tag.style.cssText = 'font-size:9px; opacity:0.85; margin-top:1px;';
                        tag.textContent = '👤 ' + dueño;
                        info.el.querySelector('.fc-event-title')?.after(tag);
                    }
                },
                eventClick: function(info) {
                    eventoActual = info.event;
                    const ext = info.event.extendedProps;
                    document.getElementById('detalle-titulo-display').textContent = info.event.title;
                    document.getElementById('detalle-creador').textContent = ext.dueno ? '👤 Creado por ' + ext.dueno : '';
                    document.getElementById('detalle-titulo-input').value = info.event.title;
                    const start = info.event.start;
                    document.getElementById('detalle-fecha').value = start ? start.toISOString().split('T')[0] : '';
                    document.getElementById('detalle-hora-inicio').value = start ? start.toTimeString().slice(0,5) : '';
                    const end = info.event.end;
                    document.getElementById('detalle-hora-fin').value = end ? end.toTimeString().slice(0,5) : '';
                    document.getElementById('detalle-materia').value = ext.materia || '';
                    document.getElementById('detalle-tipo').value = ext.tipo || 'tarea';
                    document.getElementById('modal-detalle').style.display = 'flex';
                },
            });
            cal.render();
            cargarMensajeIA();
            mostrarMotivacion();
            cargarNotas();
        });

        function togglePanel() {
            const p = document.getElementById('panel-evento');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        function cerrarModal() {
            document.getElementById('modal-borrar').style.display = 'none';
        }

        async function guardarEvento() {
        const titulo     = document.getElementById('titulo').value;
        const fecha      = document.getElementById('fecha').value;
        const horaInicio = document.getElementById('hora-inicio').value;
        const horaFin    = document.getElementById('hora-fin').value;
        const fechaFin   = document.getElementById('fecha-fin').value || fecha;
        const tipo       = document.getElementById('tipo').value;
        const materia    = document.getElementById('materia').value;

        if (!titulo || !fecha || !horaInicio || !horaFin) {
            alert('Completa todos los campos obligatorios 💔'); return;
        }

        const startDT = new Date(fecha + 'T' + horaInicio);
        const endDT   = new Date(fechaFin + 'T' + horaFin);

        if (endDT <= startDT) {
            alert('La hora de finalización debe ser después de la hora de inicio 💔'); return;
        }

        await fetch('/api/eventos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                title: titulo,
                start: fecha + 'T' + horaInicio,
                end: fechaFin + 'T' + horaFin,
                tipo, materia, calendario: calId
            })
        });
        togglePanel();
        location.reload();
    }

        async function cargarMensajeIA() {
            const el = document.getElementById('ia-mensaje');
            try {
                const res = await fetch(`/api/eventos?calendario=${calId}`);
                const eventos = await res.json();
                const hoy = new Date();
                const en3dias = new Date();
                en3dias.setDate(hoy.getDate() + 3);
                const proximos = eventos.filter(ev => {
                    const fecha = new Date(ev.start);
                    return fecha >= hoy && fecha <= en3dias;
                });
                if (proximos.length === 0) { el.textContent = '¡Todo tranquilo por ahora! No tienes eventos en los próximos 3 días 🌙'; return; }
                proximos.sort((a, b) => new Date(a.start) - new Date(b.start));
                const siguiente = proximos[0];
                const fecha = new Date(siguiente.start);
                const diasRestantes = Math.ceil((fecha - hoy) / (1000 * 60 * 60 * 24));
                const emojis = { tarea: '📘', examen: '📕', proyecto: '📗' };
                const emoji = emojis[siguiente.tipo] || '📅';
                if (diasRestantes === 0)      el.textContent = `${emoji} ¡Hoy tienes "${siguiente.title}"! Mucho ánimo 💪`;
                else if (diasRestantes === 1) el.textContent = `${emoji} Mañana tienes "${siguiente.title}". ¡Ya casi!`;
                else                          el.textContent = `${emoji} En ${diasRestantes} días: "${siguiente.title}". ¡Prepárate con tiempo!`;
                if (proximos.length > 1) el.textContent += ` (+${proximos.length - 1} más esta semana)`;
            } catch {
                el.textContent = '¡Hola! Soy Lunefia IA. Pronto te avisaré sobre tus próximos eventos 🌟';
            }
        }

        function mostrarMotivacion() {
            const mensajes = [
                "✨ Tú puedes con todo hoy 💖",
                "🌸 Cada pequeño avance cuenta",
                "💪 Sigue trabajando, vas increíble",
                "📚 Un paso más cerca de tus metas",
                "🌷 Confía en ti y en tu proceso",
                "⭐ Hoy es un buen día para avanzar",
                "💕 No te rindas, lo estás haciendo muy bien"
            ];
            document.getElementById("mensaje-motivacional").textContent =
                mensajes[Math.floor(Math.random() * mensajes.length)];
        }

        async function cargarNotas() {
            try {
                const res = await fetch(`/api/notas?calendario=${calId}`);
                const data = await res.json();
                document.getElementById('notas-texto').value = data.texto || '';
            } catch {}
        }

        async function guardarNota() {
            const texto = document.getElementById('notas-texto').value;
            await fetch('/api/notas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ texto, calendario: calId })
            });
            const btn = document.querySelector('#seccion-notas .btn-lateral');
            btn.textContent = '✓ Guardado';
            setTimeout(() => btn.textContent = 'Guardar', 1500);
        }

     let eventoActual = null;

function cerrarDetalle() { document.getElementById('modal-detalle').style.display = 'none'; }
function cerrarConfirmacion() { document.getElementById('modal-confirmar-borrar').style.display = 'none'; }

function pedirConfirmacion() {
    document.getElementById('modal-confirmar-borrar').style.display = 'flex';
    document.getElementById('modal-confirmar').onclick = async function() {
        await fetch('/api/eventos/borrar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ titulo: eventoActual.title, calendario: calId })
        });
        cerrarConfirmacion(); cerrarDetalle(); location.reload();
    };
}

async function guardarEdicion() {
    const titulo = document.getElementById('detalle-titulo-input').value;
    const fecha  = document.getElementById('detalle-fecha').value;
    const hIni   = document.getElementById('detalle-hora-inicio').value;
    const hFin   = document.getElementById('detalle-hora-fin').value;
    const materia= document.getElementById('detalle-materia').value;
    const tipo   = document.getElementById('detalle-tipo').value;
    await fetch('/api/eventos/editar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ titulo_original: eventoActual.title, title: titulo, start: fecha+'T'+hIni, end: fecha+'T'+hFin, materia, tipo, calendario: calId })
    });
    cerrarDetalle(); location.reload();
}

function toggleChat() {
    const c = document.getElementById('chat-ia');
    c.style.display = c.style.display === 'none' ? 'flex' : 'none';
}
function cerrarChat() { document.getElementById('chat-ia').style.display = 'none'; }

async function enviarMensaje() {
    const input = document.getElementById('chat-input');
    const mensaje = input.value.trim();
    if (!mensaje) return;
    input.value = '';
    const mensajes = document.getElementById('chat-mensajes');
    const divUser = document.createElement('div');
    divUser.className = 'msg-usuario';
    divUser.textContent = mensaje;
    mensajes.appendChild(divUser);
    mensajes.scrollTop = mensajes.scrollHeight;
    const divIA = document.createElement('div');
    divIA.className = 'msg-ia';
    divIA.textContent = '🌙 escribiendo...';
    mensajes.appendChild(divIA);
    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mensaje, calendario: calId })
        });
        const data = await res.json();
        divIA.textContent = data.respuesta;
    } catch {
        divIA.textContent = 'Error al conectar con la IA 💔';
    }
    mensajes.scrollTop = mensajes.scrollHeight;
}

    </script>

<!-- Chat IA -->
<div id="chat-ia" style="display:none">
    <div id="chat-header">
        <span>🌙 Lunefia IA</span>
        <button onclick="cerrarChat()">✕</button>
    </div>
    <div id="chat-mensajes"></div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Escríbele a Lunefia IA..." onkeydown="if(event.key==='Enter')enviarMensaje()">
        <button onclick="enviarMensaje()">➤</button>
    </div>
</div>
<button id="btn-chat" onclick="toggleChat()">🌙</button>

</body>
</html>
