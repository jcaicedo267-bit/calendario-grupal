<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Evento</title>
    <style>
        body {
            background-color: #FFF0F5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .formulario {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(255,182,193,0.4);
            width: 350px;
        }
        h2 { color: #d63384; text-align: center; }
        label { display: block; margin-top: 15px; color: #555; }
        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #FFB6C1;
            border-radius: 6px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        .tipos { margin-top: 10px; }
        .tipos label { display: inline; margin-left: 6px; }
        .tipos div { margin: 5px 0; }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #FFB6C1;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover { background-color: #ff8fa3; }
        .mensaje-ok { color: green; text-align: center; margin-top: 10px; }
        .mensaje-error { color: red; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="formulario">
    <h2>Nuevo Evento ✨</h2>

    {% if exito %}
        <p class="mensaje-ok">{{ exito }}</p>
    {% endif %}
    {% if error %}
        <p class="mensaje-error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/crear-evento">
        <label>Nombre del evento:</label>
        <input type="text" name="nombre" placeholder="Ej: Reunión de equipo">

        <label>Fecha:</label>
        <input type="date" name="fecha">

        <label>Tipo de evento:</label>
        <div class="tipos">
            <div><input type="radio" name="tipo" value="Académico"> <label>Académico</label></div>
            <div><input type="radio" name="tipo" value="Personal"> <label>Personal</label></div>
            <div><input type="radio" name="tipo" value="Reunión"> <label>Reunión</label></div>
            <div><input type="radio" name="tipo" value="Otro"> <label>Otro</label></div>
        </div>

        <button type="submit">Guardar Evento 💕</button>
    </form>
</div>
</body>
</html>
