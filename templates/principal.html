<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lunefia 🌙</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        #layout-principal {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 20px;
            padding: 24px 24px 120px 24px;
            align-items: start;
        }
        #columna-calendario #calendario {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #columna-lateral {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .lateral-seccion {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
        }
        .lateral-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .lateral-header span { font-size: 18px; flex-shrink: 0; }
        .lateral-header h2 { font-size: 14px; color: #fff; margin: 0; flex: 1; }
        .btn-lateral {
            padding: 5px 12px;
            background: linear-gradient(135deg, #5b3fd4, #7c5ce8);
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 11px;
            font-family: 'Sour Gummy', sans-serif;
            cursor: pointer;
        }
        #notas-texto {
            width: 100%;
            min-height: 160px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px 12px;
            color: rgba(255,255,255,0.8);
            font-size: 12.5px;
            font-family: 'Sour Gummy', sans-serif;
            resize: vertical;
            line-height: 1.6;
        }
        #notas-texto:focus { outline: none; border-color: rgba(124,92,232,0.5); }
        #notas-texto::placeholder { color: rgba(255,255,255,0.2); }
        .crear-opciones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .crear-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            font-family: 'Sour Gummy', sans-serif;
            color: white;
            transition: background 0.2s, transform 0.15s;
        }
        .crear-card:hover { background: rgba(91,63,212,0.2); transform: translateY(-2px); }
        .crear-card > span { font-size: 20px; display: block; margin-bottom: 4px; }
        .crear-card strong { font-size: 12px; display: block; margin-bottom: 2px; }
        .crear-card p { font-size: 10px; color: rgba(255,255,255,0.35); margin: 0; }
        .lista-titulo { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
        .lista-vacia { font-size: 11px; color: rgba(255,255,255,0.2); text-align: center; padding: 8px 0; }
        .calendario-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; }
        .calendario-item:hover { background: rgba(255,255,255,0.06); }
        .calendario-item > span { font-size: 16px; }
        .calendario-item strong { display: block; font-size: 12px; color: #fff; }
        .calendario-item small { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: capitalize; }
        #saludo-usuario { font-size: 13px; color: rgba(255,255,255,0.6); }
        .btn-logout { font-size: 12px; color: rgba(255,255,255,0.45); text-decoration: none; padding: 5px 12px; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; font-family: 'Sour Gummy', sans-serif; }
        .btn-logout:hover { background: rgba(255,255,255,0.07); color: white; }
        @media (max-width: 860px) {
            #layout-principal { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="encabezado">
        <div id="encabezado-contenido">
            <div>
                <h1>🌙 Lunefia</h1>
                <p>Tu calendario grupal inteligente</p>
            </div>
            <div style="display:flex;align-items:center;gap:16px">
                <span id="saludo-usuario">Hola, Onixe 👋</span>
                <a href="/logout" class="btn-logout">Salir</a>
                <div id="encabezado-puntos">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </div>

    <div id="layout-principal">

        <div id="columna-calendario">
            <div id="calendario"></div>
        </div>

        <div id="columna-lateral">

            <section class="lateral-seccion" id="seccion-notas">
                <div class="lateral-header">
                    <span>📝</span>
                    <h2>Mis notas</h2>
                    <button class="btn-lateral" onclick="guardarNota()">Guardar</button>
                </div>
                <textarea id="notas-texto" placeholder="Escribe tus notas aquí... Solo tú las ves 🌙"></textarea>
            </section>

            <section class="lateral-seccion" id="seccion-crear">
                <div class="lateral-header">
                    <span>✨</span>
                    <h2>Calendarios</h2>
                </div>
                <div class="crear-opciones">
                    <button class="crear-card" onclick="crearCalendario('personal')">
                        <span>🗓</span>
                        <strong>Personal</strong>
                        <p>Solo para ti</p>
                    </button>
                    <button class="crear-card" onclick="crearCalendario('grupal')">
                        <span>👥</span>
                        <strong>Grupal</strong>
                        <p>Con tu equipo</p>
                    </button>
                </div>
                <p class="lista-titulo">Tus calendarios</p>
                <div id="calendarios-items">
                    <p class="lista-vacia">Todavía no tienes calendarios 🌙</p>
                </div>
            </section>

        </div>
    </div>

    <div id="panel-ia">
        <div id="panel-ia-header">
            <span id="ia-icono">🌙</span>
            <div>
                <p id="ia-nombre">Lunefia IA</p>
                <span id="ia-estado">● activa</span>
            </div>
        </div>
        <div id="ia-separador"></div>
        <p id="ia-mensaje">Cargando tu resumen del día...</p>
        <div id="mensaje-motivacional"></div>
    </div>

    <button id="btn-agregar" onclick="togglePanel()">+</button>

    <div id="panel-evento" style="display:none">
        <h2>✨ Agregar evento</h2>
        <input type="text" id="titulo" placeholder="Nombre del evento">
        <label>Fecha:</label>
        <input type="date" id="fecha">
        <label>Hora:</label>
        <input type="time" id="hora">
        <label>Materia:</label>
        <input type="text" id="materia" placeholder="Ej: Biología, Matemáticas...">
        <label>Tipo:</label>
        <select id="tipo">
            <option value="tarea">📘 Tarea</option>
            <option value="examen">📕 Examen</option>
            <option value="proyecto">📗 Proyecto</option>
        </select>
        <button onclick="guardarEvento()">Guardar 💕</button>
        <button id="btn-cancelar" onclick="togglePanel()">Cancelar</button>
    </div>

    <div id="modal-borrar" style="display:none">
        <div id="modal-caja">
            <p id="modal-texto">¿Borrar este evento?</p>
            <div id="modal-botones">
                <button id="modal-confirmar">🗑 Borrar</button>
                <button id="modal-cancelar" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var cal = new FullCalendar.Calendar(document.getElementById('calendario'), {
                initialView: 'dayGridMonth',
                locale: 'es',
                nowIndicator: true,
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                events: async function(info, successCallback) {
                    const res = await fetch('/api/eventos');
                    const eventos = await res.json();
                    successCallback(eventos);
                },
                eventDidMount: function(info) {
                    const tipo = info.event.extendedProps.tipo;
                    if (tipo === 'tarea')     { info.el.style.backgroundColor = '#4A90D9'; info.el.style.borderColor = '#2C6FAC'; }
                    else if (tipo === 'examen')    { info.el.style.backgroundColor = '#E74C3C'; info.el.style.borderColor = '#B03A2E'; }
                    else if (tipo === 'proyecto')  { info.el.style.backgroundColor = '#27AE60'; info.el.style.borderColor = '#1E8449'; }
                },
                eventClick: function(info) {
                    const modal = document.getElementById('modal-borrar');
                    document.getElementById('modal-texto').textContent = '¿Borrar "' + info.event.title + '"?';
                    modal.style.display = 'flex';
                    document.getElementById('modal-confirmar').onclick = function() {
                        fetch('/api/eventos/borrar', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ titulo: info.event.title })
                        }).then(() => location.reload());
                    };
                },
            });
            cal.render();
            cargarMensajeIA();
            mostrarMotivacion();
            cargarNotas();
            cargarCalendarios();
        });

        function togglePanel() {
            const p = document.getElementById('panel-evento');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        function cerrarModal() {
            document.getElementById('modal-borrar').style.display = 'none';
        }

        async function guardarEvento() {
            const titulo  = document.getElementById('titulo').value;
            const fecha   = document.getElementById('fecha').value;
            const hora    = document.getElementById('hora').value;
            const tipo    = document.getElementById('tipo').value;
            const materia = document.getElementById('materia').value;
            await fetch('/api/eventos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: titulo, start: fecha + 'T' + hora, tipo, materia })
            });
            togglePanel();
            location.reload();
        }

        async function cargarMensajeIA() {
            const el = document.getElementById('ia-mensaje');
            try {
                const res = await fetch('/api/eventos');
                const eventos = await res.json();
                const hoy = new Date();
                const en3dias = new Date();
                en3dias.setDate(hoy.getDate() + 3);
                const proximos = eventos.filter(ev => {
                    const fecha = new Date(ev.start);
                    return fecha >= hoy && fecha <= en3dias;
                });
                if (proximos.length === 0) { el.textContent = '¡Todo tranquilo por ahora! No tienes eventos en los próximos 3 días 🌙'; return; }
                proximos.sort((a, b) => new Date(a.start) - new Date(b.start));
                const siguiente = proximos[0];
                const fecha = new Date(siguiente.start);
                const diasRestantes = Math.ceil((fecha - hoy) / (1000 * 60 * 60 * 24));
                const emojis = { tarea: '📘', examen: '📕', proyecto: '📗' };
                const emoji = emojis[siguiente.tipo] || '📅';
                if (diasRestantes === 0)      el.textContent = `${emoji} ¡Hoy tienes "${siguiente.title}"! Mucho ánimo 💪`;
                else if (diasRestantes === 1) el.textContent = `${emoji} Mañana tienes "${siguiente.title}". ¡Ya casi!`;
                else                          el.textContent = `${emoji} En ${diasRestantes} días: "${siguiente.title}". ¡Prepárate con tiempo!`;
                if (proximos.length > 1) el.textContent += ` (+${proximos.length - 1} más esta semana)`;
            } catch {
                el.textContent = '¡Hola! Soy Lunefia IA. Pronto te avisaré sobre tus próximos eventos 🌟';
            }
        }

        function mostrarMotivacion() {
            const mensajes = [
                "✨ Tú puedes con todo hoy 💖",
                "🌸 Cada pequeño avance cuenta",
                "💪 Sigue trabajando, vas increíble",
                "📚 Un paso más cerca de tus metas",
                "🌷 Confía en ti y en tu proceso",
                "⭐ Hoy es un buen día para avanzar",
                "💕 No te rindas, lo estás haciendo muy bien"
            ];
            document.getElementById("mensaje-motivacional").textContent =
                mensajes[Math.floor(Math.random() * mensajes.length)];
        }

        async function cargarNotas() {
            try {
                const res = await fetch('/api/notas');
                const data = await res.json();
                document.getElementById('notas-texto').value = data.texto || '';
            } catch {}
        }

        async function guardarNota() {
            const texto = document.getElementById('notas-texto').value;
            await fetch('/api/notas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ texto })
            });
            const btn = document.querySelector('#seccion-notas .btn-lateral');
            btn.textContent = '✓ Guardado';
            setTimeout(() => btn.textContent = 'Guardar', 1500);
        }

        async function cargarCalendarios() {
            try {
                const res = await fetch('/api/calendarios');
                const lista = await res.json();
                const contenedor = document.getElementById('calendarios-items');
                if (lista.length === 0) return;
                contenedor.innerHTML = '';
                lista.forEach(c => {
                    const item = document.createElement('div');
                    item.className = 'calendario-item';
                    item.innerHTML = `<span>${c.tipo === 'grupal' ? '👥' : '🗓'}</span>
                        <div><strong>${c.nombre}</strong><small>${c.tipo}</small></div>`;
                    contenedor.appendChild(item);
                });
            } catch {}
        }

        function crearCalendario(tipo) {
            const nombre = prompt(tipo === 'grupal' ? '¿Nombre del calendario grupal?' : '¿Nombre del calendario personal?');
            if (!nombre) return;
            fetch('/api/calendarios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, tipo })
            }).then(() => cargarCalendarios());
        }
    </script>

</body>
</html>
